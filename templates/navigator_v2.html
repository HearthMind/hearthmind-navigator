<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigator — HearthMind</title>
<link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">
<style>
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-card: #1e2a45;
  --bg-card-hover: #243352;
  --bg-input: #0f1729;
  --text-primary: #e0dcd0;
  --text-secondary: #8a8678;
  --text-muted: #5a5850;
  --accent-warm: #d4803a;
  --accent-gold: #e8b849;
  --accent-ember: #e85d3a;
  --accent-green: #5cb85c;
  --accent-teal: #3ab0a2;
  --border: #2a3654;
  --border-hover: #3a4a6a;
  --shadow: 0 4px 20px rgba(0,0,0,0.3);
  --font-main: 'OpenDyslexic', 'OpenDyslexic3', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-main);
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  height: 100vh;
  line-height: 1.6;
  font-size: 14px;
  letter-spacing: 0.02em;
}

/* ── Header ── */
.topbar {
  background: var(--bg-secondary);
  border-bottom: 2px solid var(--accent-warm);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.topbar-wordmark { color: var(--accent-warm); font-weight: bold; font-size: 1rem; letter-spacing: 0.06em; text-transform: uppercase; }
.topbar-title { color: var(--text-primary); font-size: 1rem; font-weight: normal; color: var(--text-secondary); }
.topbar-sub { margin-left: auto; font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green); display: inline-block; box-shadow: 0 0 6px var(--accent-green); }

/* ── Layout ── */
.workspace { display: flex; flex: 1; overflow: hidden; }
</style>
<style>
/* ── Left panel ── */
.panel-left {
  width: 220px; flex-shrink: 0;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto;
}
.panel-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.panel-label {
  font-size: 0.65rem; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
}
.search-input {
  width: 100%; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; color: var(--text-primary);
  font-family: var(--font-main); font-size: 0.8rem; outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent-warm); }
.search-input::placeholder { color: var(--text-muted); }

.filter-btn {
  display: block; width: 100%; text-align: left; background: none; border: none;
  padding: 5px 6px; color: var(--text-secondary); font-family: var(--font-main);
  font-size: 0.78rem; cursor: pointer; border-radius: 6px; transition: all 0.15s;
}
.filter-btn:hover { background: var(--bg-card); color: var(--text-primary); }
.filter-btn.active { background: rgba(212,128,58,0.15); color: var(--accent-warm); }
.filter-count { float: right; font-size: 0.68rem; color: var(--text-muted); }
.filter-btn.active .filter-count { color: var(--accent-warm); opacity: 0.7; }

.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
.stat-val { color: var(--accent-warm); font-weight: bold; font-size: 0.85rem; }
.stat-lbl { color: var(--text-muted); font-size: 0.72rem; }
.stat-plain { color: var(--text-secondary); font-size: 0.72rem; }
</style>
<style>
/* ── Center panel ── */
.panel-center { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.results-header {
  padding: 10px 18px; background: var(--bg-secondary);
  border-bottom: 1px solid var(--border); display: flex; align-items: center; flex-shrink: 0;
}
.results-count { font-size: 0.75rem; color: var(--text-muted); }
.results-count span { color: var(--accent-warm); font-weight: bold; }
.results-scroll { flex: 1; overflow-y: auto; padding: 14px 16px; }

.program-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
  cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow);
}
.program-card:hover { border-color: var(--border-hover); background: var(--bg-card-hover); transform: translateY(-1px); }
.program-card.selected { border-color: var(--accent-warm); background: var(--bg-card-hover); }

.card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 4px; }
.card-title { font-size: 0.85rem; font-weight: bold; color: var(--text-primary); line-height: 1.4; flex: 1; }
.card-badge {
  font-size: 0.6rem; padding: 2px 8px; border-radius: 10px;
  background: var(--bg-input); color: var(--text-muted);
  flex-shrink: 0; white-space: nowrap; align-self: flex-start; margin-top: 2px; text-transform: capitalize;
}
.card-badge.grants { background: rgba(92,184,92,0.12); color: var(--accent-green); }
.card-badge.loans { background: rgba(58,176,162,0.12); color: var(--accent-teal); }
.card-badge.direct_payments { background: rgba(232,184,73,0.12); color: var(--accent-gold); }
.card-badge.services { background: rgba(212,128,58,0.12); color: var(--accent-warm); }
.card-badge.training { background: rgba(232,93,58,0.12); color: var(--accent-ember); }

.card-agency { font-size: 0.68rem; color: var(--text-muted); margin-bottom: 5px; }
.card-objectives { font-size: 0.76rem; color: var(--text-secondary); line-height: 1.55; }
.card-footer { margin-top: 8px; display: flex; gap: 10px; align-items: center; }
.card-link { font-size: 0.68rem; color: var(--accent-teal); text-decoration: none; }
.card-link:hover { text-decoration: underline; }
.card-eligibility { font-size: 0.65rem; color: var(--text-muted); cursor: help; }

.loading { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.82rem; }
.empty { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.82rem; line-height: 1.7; }
</style>
<style>
/* ── Right panel: chat ── */
.panel-right {
  width: 310px; flex-shrink: 0;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.chat-header {
  padding: 14px 18px; border-bottom: 2px solid var(--accent-warm);
  flex-shrink: 0; background: var(--bg-secondary);
}
.chat-title { font-size: 0.88rem; font-weight: bold; color: var(--accent-gold); letter-spacing: 0.04em; margin-bottom: 2px; }
.chat-sub { font-size: 0.68rem; color: var(--text-muted); }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px;
}
.msg { max-width: 92%; padding: 8px 12px; border-radius: 10px; font-size: 0.78rem; line-height: 1.6; }
.msg-user {
  background: rgba(212,128,58,0.12); border: 1px solid rgba(212,128,58,0.3);
  color: #d4c0a8; align-self: flex-end;
}
.msg-assistant a {
  word-break: break-all;
}
.msg-assistant {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); align-self: flex-start;
}
.msg-assistant a { color: var(--accent-teal); }
.msg-thinking {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-muted); align-self: flex-start; font-style: italic; font-size: 0.73rem;
}
.chat-welcome {
  color: var(--text-muted); font-size: 0.76rem; text-align: center;
  padding: 16px 8px; line-height: 1.9;
}
.chat-welcome strong { color: var(--text-secondary); font-weight: normal; }

.chat-input-area {
  padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0;
}
.chat-input {
  flex: 1; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 10px; color: var(--text-primary);
  font-family: var(--font-main); font-size: 0.78rem; outline: none;
  resize: none; height: 60px; transition: border-color 0.2s;
}
.chat-input:focus { border-color: var(--accent-warm); }
.chat-input::placeholder { color: var(--text-muted); }
.chat-send {
  background: var(--accent-warm); border: none; border-radius: 8px;
  width: 36px; height: 36px; color: var(--bg-primary); cursor: pointer;
  font-size: 1rem; font-weight: bold; transition: all 0.2s; align-self: flex-end;
}
.chat-send:hover { background: var(--accent-gold); transform: translateY(-1px); }
.chat-send:disabled { background: var(--bg-card); color: var(--text-muted); cursor: not-allowed; transform: none; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-wordmark">HearthMind</span>
  <span class="topbar-title">/ Navigator</span>
  <span class="topbar-sub">
    <span class="status-dot"></span>
    <span id="program-count">...</span> federal programs
  </span>
</div>

<div class="workspace">
  <div class="panel-left">
    <div class="panel-section">
      <div class="panel-label">Search</div>
      <input class="search-input" id="search-input" type="text" placeholder="disability, housing, veterans..." autocomplete="off">
    </div>
    <div class="panel-section">
      <div class="panel-label">Category</div>
      <button class="filter-btn active" data-category="all" onclick="setCategory(this)">All <span class="filter-count" id="count-all"></span></button>
      <button class="filter-btn" data-category="grants" onclick="setCategory(this)">Grants <span class="filter-count" id="count-grants"></span></button>
      <button class="filter-btn" data-category="direct_payments" onclick="setCategory(this)">Direct Payments <span class="filter-count" id="count-direct_payments"></span></button>
      <button class="filter-btn" data-category="loans" onclick="setCategory(this)">Loans <span class="filter-count" id="count-loans"></span></button>
      <button class="filter-btn" data-category="services" onclick="setCategory(this)">Services <span class="filter-count" id="count-services"></span></button>
      <button class="filter-btn" data-category="training" onclick="setCategory(this)">Training <span class="filter-count" id="count-training"></span></button>
      <button class="filter-btn" data-category="advisory" onclick="setCategory(this)">Advisory <span class="filter-count" id="count-advisory"></span></button>
    </div>
    <div class="panel-section">
      <div class="panel-label">Database</div>
      <div class="stat-row"><span class="stat-lbl">Programs</span><span class="stat-val" id="stat-total">—</span></div>
      <div class="stat-row"><span class="stat-lbl">Source</span><span class="stat-plain">SAM.gov</span></div>
      <div class="stat-row"><span class="stat-lbl">Updated</span><span class="stat-plain">Feb 2026</span></div>
    </div>
  </div>

  <div class="panel-center">
    <div class="results-header">
      <span class="results-count">Showing <span id="results-showing">...</span> of <span id="results-total">...</span> programs</span>
    </div>
    <div class="results-scroll" id="results-container">
      <div class="loading">Loading programs…</div>
    </div>
  </div>

  <div class="panel-right">
    <div class="chat-header">
      <div class="chat-title">Ask Navigator</div>
      <div class="chat-sub">Describe your situation</div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-welcome">
        Tell me what kind of help you're looking for.<br><br>
        <strong>You don't need the right words.</strong><br>
        Just say what's going on.
      </div>
    </div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="I have a disability and need help with rent…"></textarea>
      <button class="chat-send" id="chat-send" onclick="sendMessage()">↑</button>
    </div>
  </div>
</div>

<script>
let currentCategory = 'all', currentQuery = '', searchTimer = null, chatHistory = [], isThinking = false;

document.addEventListener('DOMContentLoaded', () => {
  loadCategories();
  loadPrograms();
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentQuery = e.target.value.trim(); loadPrograms(); }, 350);
  });
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
});

async function loadCategories() {
  try {
    const cats = await (await fetch('/api/categories')).json();
    const total = cats.reduce((s, c) => s + c.count, 0);
    document.getElementById('stat-total').textContent = total.toLocaleString();
    document.getElementById('program-count').textContent = total.toLocaleString();
    const el = document.getElementById('count-all');
    if (el) el.textContent = total.toLocaleString();
    cats.forEach(c => { const e = document.getElementById('count-' + c.id); if (e) e.textContent = c.count.toLocaleString(); });
  } catch(e) { console.error(e); }
}

function setCategory(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = btn.dataset.category;
  loadPrograms();
}

async function loadPrograms() {
  const container = document.getElementById('results-container');
  container.innerHTML = '<div class="loading">Searching…</div>';
  const params = new URLSearchParams({ q: currentQuery, category: currentCategory === 'all' ? '' : currentCategory, limit: 60, offset: 0 });
  try {
    const data = await (await fetch('/api/programs?' + params)).json();
    renderPrograms(data);
  } catch(e) { container.innerHTML = '<div class="empty">Error loading programs.</div>'; }
}
</script>

<script>
function renderPrograms(data) {
  const container = document.getElementById('results-container');
  document.getElementById('results-showing').textContent = data.results.length.toLocaleString();
  document.getElementById('results-total').textContent = data.total.toLocaleString();
  if (!data.results.length) { container.innerHTML = '<div class="empty">No programs found.<br>Try different search terms.</div>'; return; }
  container.innerHTML = data.results.map(p => `
    <div class="program-card" onclick="selectProgram(this, '${escHtml(p.title)}')">
      <div class="card-header">
        <div class="card-title">${escHtml(p.title)}</div>
        <span class="card-badge ${p.category}">${p.category.replace('_',' ')}</span>
      </div>
      <div class="card-agency">${escHtml(p.agency_short)}</div>
      <div class="card-objectives">${escHtml(p.objectives.substring(0,180))}${p.objectives.length > 180 ? '…' : ''}</div>
      <div class="card-footer">
        ${p.url ? `<a class="card-link" href="${p.url}" target="_blank" rel="noopener">View on SAM.gov →</a>` : ''}
        ${p.eligibility ? `<span class="card-eligibility" title="${escHtml(p.eligibility)}">Eligibility info ⓘ</span>` : ''}
      </div>
    </div>`).join('');
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function selectProgram(card, title) {
  document.querySelectorAll('.program-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  const ci = document.getElementById('chat-input');
  if (!ci.value.trim()) { ci.value = `Tell me more about "${title}" — do I qualify?`; ci.focus(); }
}

async function sendMessage() {
  if (isThinking) return;
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message) return;
  input.value = '';
  appendMessage('user', message);
  chatHistory.push({ role: 'user', text: message });
  isThinking = true;
  document.getElementById('chat-send').disabled = true;
  const thinking = appendMessage('thinking', 'Looking through programs…');
  try {
    const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message, history: chatHistory.slice(-6) }) });
    const data = await res.json();
    thinking.remove();
    appendMessage('assistant', data.error ? `Sorry, I ran into an issue: ${data.error}` : data.reply);
    if (!data.error) chatHistory.push({ role: 'model', text: data.reply });
  } catch(e) { thinking.remove(); appendMessage('assistant', 'Something went wrong. Please try again.'); }
  isThinking = false;
  document.getElementById('chat-send').disabled = false;
}

function mdToHtml(text) {
  let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener" style="color:#7dd3fc;text-decoration:underline;">$1</a>');
  s = s.replace(/(^|[\s])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noopener" style="color:#7dd3fc;text-decoration:underline;">$2</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

function appendMessage(role, text) {
  const container = document.getElementById('chat-messages');
  const welcome = container.querySelector('.chat-welcome');
  if (welcome) welcome.remove();
  const el = document.createElement('div');
  el.className = `msg msg-${role}`;
  if (role === 'assistant') {
    el.innerHTML = mdToHtml(text);
  } else {
    el.textContent = text;
  }
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
  return el;
}
</script>
</body>
</html>
